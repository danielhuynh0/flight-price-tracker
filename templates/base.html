<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Flight Price Tracker{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 56px;
    }
    nav .brand { color: #fff; font-weight: 700; font-size: 1.1rem; text-decoration: none; }
    nav a { color: #aab4c8; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: #fff; }

    .container { max-width: 780px; margin: 2.5rem auto; padding: 0 1.5rem; }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem; }
    h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.2rem; color: #444; }

    .card {
      background: #fff;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 1.5rem;
    }

    .flash { padding: .75rem 1rem; border-radius: 6px; margin-bottom: 1.2rem; font-size: .9rem; }
    .flash.success { background: #d4edda; color: #155724; }
    .flash.error   { background: #f8d7da; color: #721c24; }

    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; color: #555; }

    input[type=text], input[type=number], input[type=date], input[type=email], select {
      width: 100%; padding: .55rem .75rem;
      border: 1px solid #d0d7e2; border-radius: 6px;
      font-size: .95rem; background: #fafbfc;
      margin-bottom: 1rem;
      transition: border-color .15s;
    }
    input:focus, select:focus { outline: none; border-color: #4a6cf7; background: #fff; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    button, .btn {
      display: inline-block; padding: .6rem 1.4rem;
      background: #4a6cf7; color: #fff;
      border: none; border-radius: 6px;
      font-size: .95rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background .15s;
    }
    button:hover, .btn:hover { background: #3a5ce5; }
    .btn-danger { background: #e53e3e; }
    .btn-danger:hover { background: #c53030; }
    .btn-sm { padding: .35rem .9rem; font-size: .82rem; }

    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { text-align: left; padding: .6rem .8rem; border-bottom: 2px solid #e8ecf0; color: #666; font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; }
    td { padding: .7rem .8rem; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block; padding: .2rem .6rem;
      border-radius: 99px; font-size: .75rem; font-weight: 600;
    }
    .badge-economy  { background: #e8f4fd; color: #1a6fa3; }
    .badge-business { background: #fdf3e8; color: #a36e1a; }
    .badge-first    { background: #f0e8fd; color: #6e1aa3; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">✈ Flight Tracker</a>
    <a href="/">Monitor a Route</a>
    <a href="/routes">My Routes</a>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
